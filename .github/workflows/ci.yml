name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: astral-sh/setup-uv@v6
      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked
      - run: cargo test -p sift --no-default-features --features edge --locked
      - run: cargo check --workspace --all-features --locked
      - run: cargo build --workspace --release --locked
      - run: python3 -m compileall -q sift_build reranker tests benchmarks
      - run: bash -n tests/*.sh
      - run: cargo package -p sift-core --locked --allow-dirty
      - run: cargo package -p sift --locked --allow-dirty --no-verify
